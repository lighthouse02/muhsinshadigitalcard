<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Papan Ucapan &amp; Doa — Muhsin &amp; Syaqiela</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=EB+Garamond:ital,wght@0,400;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:       #C8A96E;
      --gold-light: #e8d5a3;
      --gold-dark:  #9a7a42;
      --ivory:      #FDFAF4;
      --text:       #2a2018;
      --text-light: #5c4f3d;
      --bg:         #1a1108;
      --bg-card:    #251c0e;
      --bg-card2:   #2c2010;
      --radius:     14px;
    }

    /* ── Page ── */
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--ivory);
      font-family: 'DM Sans', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.6rem;
      padding: 1.1rem 2.4rem;
      background: linear-gradient(to bottom, rgba(26,17,8,1) 70%, rgba(26,17,8,0));
    }

    .header-ornament {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--gold-dark));
      opacity: .55;
    }
    .header-ornament.right {
      background: linear-gradient(to left, transparent, var(--gold-dark));
    }

    .header-inner {
      text-align: center;
      flex-shrink: 0;
    }

    .header-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: clamp(.72rem, 1.1vw, .88rem);
      font-weight: 600;
      letter-spacing: .28em;
      text-transform: uppercase;
      color: var(--gold);
      opacity: .9;
      margin-bottom: .25rem;
    }

    .header-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: clamp(2rem, 3.6vw, 3.2rem);
      font-weight: 400;
      color: var(--ivory);
      line-height: 1;
      letter-spacing: .02em;
    }

    .header-title em {
      font-style: italic;
      color: var(--gold-light);
    }

    .header-sub {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(.8rem, 1.3vw, 1rem);
      color: var(--gold);
      opacity: .75;
      margin-top: .3rem;
      letter-spacing: .06em;
    }

    /* ── Scrolling wall ── */
    #wall {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      padding-top: 120px;
      padding-bottom: 40px;
      padding-left: 2rem;
      padding-right: 2rem;
      overflow: hidden;
    }

    /* ── Masonry columns ── */
    #mosaic {
      columns: 3 360px;
      column-gap: 1.4rem;
      /* inner scroll driven by JS */
    }

    @media (max-width: 900px) {
      #mosaic { columns: 2 280px; }
    }

    /* ── Card base ── */
    .wc {
      break-inside: avoid;
      margin-bottom: 1.4rem;
      background: var(--bg-card);
      border-radius: var(--radius);
      border: 1px solid rgba(200,169,110,.14);
      padding: 1.3rem 1.5rem 1.2rem;
      box-shadow: 0 6px 28px rgba(0,0,0,.45);
      animation: fadeUp .55s ease both;
      cursor: default;
    }

    /* slight alternating tint for visual mosaic feel */
    .wc:nth-child(3n+2) { background: var(--bg-card2); }
    .wc:nth-child(5n+4) { background: #1f1709; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ── */
    .wc-avatar {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--bg);
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 600;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .wc-avatar-doa {
      width: 46px; height: 46px;
      border-radius: 50%;
      background: rgba(200,169,110,.12);
      border: 1.5px solid rgba(200,169,110,.3);
      font-size: 1.4rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* ── Meta row ── */
    .wc-meta {
      display: flex;
      align-items: center;
      gap: .7rem;
      margin-bottom: .75rem;
    }

    .wc-name {
      font-weight: 600;
      font-size: clamp(.9rem, 1.5vw, 1.05rem);
      color: var(--gold-light);
      flex: 1;
    }

    .wc-badge {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      padding: .18rem .6rem;
      border-radius: 30px;
      text-transform: uppercase;
    }

    .wc-badge-photo {
      background: rgba(200,169,110,.15);
      color: var(--gold);
      border: 1px solid rgba(200,169,110,.3);
    }

    .wc-badge-doa {
      background: rgba(120,200,150,.12);
      color: #88d9a0;
      border: 1px solid rgba(120,200,150,.25);
    }

    /* ── Text ── */
    .wc-text {
      font-family: 'EB Garamond', Georgia, serif;
      font-size: clamp(1rem, 1.7vw, 1.25rem);
      color: rgba(253,250,244,.88);
      line-height: 1.6;
      margin-bottom: .65rem;
    }

    .wc-caption {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: clamp(.9rem, 1.5vw, 1.1rem);
      color: rgba(253,250,244,.72);
      line-height: 1.55;
      margin-top: .55rem;
      margin-bottom: .5rem;
    }

    .wc-time {
      font-size: clamp(.72rem, 1.1vw, .82rem);
      color: rgba(200,169,110,.55);
      letter-spacing: .03em;
    }

    /* ── Photo card ── */
    .wc-photo img {
      width: 100%;
      border-radius: calc(var(--radius) - 2px) calc(var(--radius) - 2px) 0 0;
      display: block;
      max-height: 320px;
      object-fit: cover;
      margin: -1.3rem -1.5rem 1rem;
      width: calc(100% + 3rem);
    }

    /* ── Quote mark accent on wish cards ── */
    .wc-quote-icon {
      font-size: 2.8rem;
      line-height: 1;
      color: rgba(200,169,110,.15);
      font-family: 'Playfair Display', serif;
      float: left;
      margin-right: .4rem;
      margin-top: -.15rem;
      user-select: none;
    }

    /* ── Divider accent ── */
    .wc-divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(200,169,110,.2), transparent);
      margin: .7rem 0;
    }

    /* ── Empty state ── */
    #empty {
      display: none;
      text-align: center;
      padding: 5rem 2rem;
    }

    #empty.visible { display: block; }

    .empty-icon {
      font-size: 3rem;
      color: rgba(200,169,110,.35);
      margin-bottom: 1rem;
    }

    .empty-msg {
      font-family: 'EB Garamond', Georgia, serif;
      font-style: italic;
      font-size: 1.4rem;
      color: rgba(253,250,244,.45);
    }

    /* ── Bottom fade gradient ── */
    .wall-fade-bottom {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(to top, var(--bg), transparent);
      pointer-events: none;
      z-index: 5;
    }

    /* ── Live badge ── */
    .live-badge {
      position: fixed;
      bottom: 1.4rem;
      right: 1.8rem;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: .45rem;
      background: rgba(26,17,8,.85);
      border: 1px solid rgba(200,169,110,.25);
      border-radius: 30px;
      padding: .35rem .85rem;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(200,169,110,.7);
      backdrop-filter: blur(8px);
    }

    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #5dd97a;
      box-shadow: 0 0 0 0 rgba(93,217,122,.5);
      animation: pulse-dot 2s infinite;
    }

    @keyframes pulse-dot {
      0%   { box-shadow: 0 0 0 0 rgba(93,217,122,.5); }
      70%  { box-shadow: 0 0 0 6px rgba(93,217,122,0); }
      100% { box-shadow: 0 0 0 0 rgba(93,217,122,0); }
    }

    /* ── "Leave a Wish" floating trigger ── */
    .wish-fab {
      position: fixed;
      bottom: 1.4rem;
      left: 1.8rem;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: .55rem;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--bg);
      border: none;
      border-radius: 50px;
      padding: .65rem 1.4rem;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(200,169,110,.4);
      transition: transform .18s, box-shadow .18s;
    }
    .wish-fab:hover { transform: translateY(-2px); box-shadow: 0 7px 28px rgba(200,169,110,.5); }
    .wish-fab:active { transform: scale(.97); }

    /* ── Drawer backdrop ── */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      z-index: 30;
      background: rgba(10, 7, 2, .72);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease;
    }
    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    /* ── Slide-up drawer ── */
    .wish-drawer {
      position: fixed;
      bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      z-index: 40;
      width: min(520px, 96vw);
      background: #1e1508;
      border-radius: 24px 24px 0 0;
      border-top: 1px solid rgba(200,169,110,.22);
      border-left: 1px solid rgba(200,169,110,.12);
      border-right: 1px solid rgba(200,169,110,.12);
      padding: 0 2rem 2rem;
      box-shadow: 0 -12px 60px rgba(0,0,0,.7);
      transition: transform .36s cubic-bezier(.22,.68,0,1.2);
    }
    .wish-drawer.open {
      transform: translateX(-50%) translateY(0);
    }

    /* drag handle */
    .drawer-handle {
      width: 40px; height: 4px;
      background: rgba(200,169,110,.3);
      border-radius: 2px;
      margin: 1rem auto .8rem;
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
    }

    .drawer-title {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 1.3rem;
      color: var(--gold-light);
    }

    .drawer-close {
      background: none;
      border: 1px solid rgba(200,169,110,.2);
      color: rgba(200,169,110,.7);
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: background .15s, color .15s;
    }
    .drawer-close:hover { background: rgba(200,169,110,.12); color: var(--gold); }

    /* Type tabs */
    .d-type-tabs {
      display: flex;
      gap: .6rem;
      margin-bottom: 1.2rem;
    }

    .d-type-btn {
      flex: 1;
      padding: .55rem .5rem;
      background: rgba(200,169,110,.07);
      border: 1px solid rgba(200,169,110,.18);
      border-radius: 10px;
      color: rgba(253,250,244,.65);
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: .4rem;
      transition: background .15s, border-color .15s, color .15s;
    }
    .d-type-btn.active {
      background: rgba(200,169,110,.18);
      border-color: rgba(200,169,110,.55);
      color: var(--gold-light);
    }

    /* Form fields */
    .d-form-group { margin-bottom: 1rem; }

    .d-form-group label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      letter-spacing: .04em;
      color: rgba(200,169,110,.75);
      text-transform: uppercase;
      margin-bottom: .4rem;
    }

    .d-form-group input,
    .d-form-group textarea {
      width: 100%;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(200,169,110,.22);
      border-radius: 10px;
      padding: .75rem 1rem;
      color: var(--ivory);
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 1.1rem;
      outline: none;
      transition: border-color .15s;
      resize: none;
    }
    .d-form-group input::placeholder,
    .d-form-group textarea::placeholder { color: rgba(253,250,244,.3); }
    .d-form-group input:focus,
    .d-form-group textarea:focus { border-color: rgba(200,169,110,.6); }

    .d-error {
      font-size: .8rem;
      color: #e07b7b;
      margin-top: .3rem;
      display: none;
    }
    .d-error.visible { display: block; }

    /* Submit */
    .d-submit {
      width: 100%;
      padding: .85rem;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold));
      color: var(--bg);
      border: none;
      border-radius: 50px;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: .5rem;
      margin-top: .5rem;
      transition: opacity .15s, transform .15s;
    }
    .d-submit:hover { opacity: .92; transform: translateY(-1px); }
    .d-submit:active { transform: scale(.98); }
    .d-submit:disabled { opacity: .5; cursor: not-allowed; }

    /* ── Toast ── */
    .wish-toast {
      position: fixed;
      bottom: 5rem;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      z-index: 50;
      background: rgba(34,139,68,.92);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      padding: .7rem 1.6rem;
      border-radius: 30px;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s, transform .3s;
    }
    .wish-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="header-ornament"></div>
    <div class="header-inner">
      <div class="header-eyebrow">Papan Ucapan &amp; Doa</div>
      <h1 class="header-title"><em>Muhsin</em> &amp; <em>Syaqiela</em></h1>
      <p class="header-sub">Messages from the hearts of our beloved guests</p>
    </div>
    <div class="header-ornament right"></div>
  </header>

  <!-- ── Wall ── -->
  <div id="wall">
    <div id="mosaic" aria-live="polite" aria-label="Guest wishes"></div>
    <div id="empty">
      <div class="empty-icon"><i class="far fa-comment-dots"></i></div>
      <p class="empty-msg">Wishes will appear here as guests send them&hellip;</p>
    </div>
  </div>

  <!-- ── Bottom fade ── -->
  <div class="wall-fade-bottom"></div>

  <!-- ── Live indicator ── -->
  <div class="live-badge" title="Auto-refreshes every 10 seconds">
    <span class="live-dot"></span> Live
  </div>

  <!-- ── Leave a Wish FAB ── -->
  <button class="wish-fab" id="wish-fab" aria-label="Leave a wish" aria-haspopup="dialog">
    <i class="fas fa-feather-alt"></i> Leave a Wish
  </button>

  <!-- ── Backdrop ── -->
  <div class="drawer-backdrop" id="drawer-backdrop" aria-hidden="true"></div>

  <!-- ── Wish input drawer ── -->
  <div class="wish-drawer" id="wish-drawer" role="dialog" aria-modal="true" aria-labelledby="drawer-title">
    <div class="drawer-handle" aria-hidden="true"></div>
    <div class="drawer-header">
      <span class="drawer-title" id="drawer-title">Your Message for Muhsin &amp; Syaqiela</span>
      <button class="drawer-close" id="drawer-close" aria-label="Close"><i class="fas fa-times"></i></button>
    </div>

    <!-- Type selector -->
    <div class="d-type-tabs" role="tablist" aria-label="Wish type">
      <button class="d-type-btn active" data-type="wish" role="tab" aria-selected="true">
        <span>💬</span> Wish
      </button>
      <button class="d-type-btn" data-type="doa" role="tab" aria-selected="false">
        <span>🤲</span> Doa
      </button>
    </div>

    <form id="wall-wish-form" novalidate>
      <div class="d-form-group">
        <label for="w-name">Your Name *</label>
        <input type="text" id="w-name" placeholder="Your name" maxlength="60" autocomplete="off" />
        <div class="d-error" id="w-name-err">Please enter your name.</div>
      </div>

      <div class="d-form-group" id="w-wish-group">
        <label for="w-text">Your Wish *</label>
        <textarea id="w-text" rows="3" placeholder="Your wishes for Muhsin &amp; Syaqiela…" maxlength="400"></textarea>
        <div class="d-error" id="w-text-err">Please write your wish.</div>
      </div>

      <div class="d-form-group" id="w-doa-group" hidden>
        <label for="w-doa">Your Doa *</label>
        <textarea id="w-doa" rows="3" placeholder="Your doa for the couple…" maxlength="400"></textarea>
        <div class="d-error" id="w-doa-err">Please write your doa.</div>
      </div>

      <button type="submit" class="d-submit" id="w-submit">
        <i class="fas fa-paper-plane"></i> Post to Wall
      </button>
    </form>
  </div>

  <!-- ── Toast ── -->
  <div class="wish-toast" id="wish-toast" role="status" aria-live="polite"></div>

  <script>
    (() => {
      'use strict';

      /* ─────────────────── Constants ─────────────────── */
      const GB_KEY  = 'muhsin_syaqiela_guestbook';
      const GB_MAX  = 30;
      const mosaic  = document.getElementById('mosaic');
      const empty   = document.getElementById('empty');

      /* ─────────────────── Helpers ─────────────────── */
      function esc(s) {
        if (!s) return '';
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function sanitize(s) {
        // Strip tags, trim, collapse whitespace
        return String(s || '').replace(/<[^>]*>/g, '').replace(/\s+/g, ' ').trim().slice(0, 400);
      }

      function load() {
        try { return JSON.parse(localStorage.getItem(GB_KEY)) || []; }
        catch { return []; }
      }

      function save(entries) {
        try { localStorage.setItem(GB_KEY, JSON.stringify(entries.slice(-GB_MAX))); } catch { /* quota */ }
      }

      function relTime(ts) {
        if (!ts) return 'Just now';
        const d = Math.floor((Date.now() - ts) / 1000);
        if (d < 60)    return 'Just now';
        if (d < 3600)  return Math.floor(d / 60) + ' min ago';
        if (d < 86400) return Math.floor(d / 3600) + ' hr ago';
        return new Date(ts).toLocaleDateString('ms-MY', { day: 'numeric', month: 'short' });
      }

      /* ─────────────────── Card builder ─────────────────── */
      function buildCard(entry) {
        const initial = esc((entry.name || '?').charAt(0).toUpperCase());
        const name    = esc(entry.name || 'Guest');
        const time    = esc(relTime(entry.time));

        if (entry.type === 'photo') {
          return `<div class="wc wc-photo">
            <img src="${esc(entry.photoDataUrl)}" alt="Photo by ${name}" />
            <div class="wc-meta">
              <div class="wc-avatar">${initial}</div>
              <span class="wc-name">${name}</span>
              <span class="wc-badge wc-badge-photo"><i class="fas fa-camera"></i> Photo</span>
            </div>
            ${entry.caption ? `<p class="wc-caption">${esc(entry.caption)}</p>` : ''}
            <span class="wc-time">${time}</span>
          </div>`;
        }

        if (entry.type === 'doa') {
          return `<div class="wc">
            <div class="wc-meta">
              <div class="wc-avatar-doa">🤲</div>
              <span class="wc-name">${name}</span>
              <span class="wc-badge wc-badge-doa">Doa</span>
            </div>
            <div class="wc-divider"></div>
            <p class="wc-text">${esc(entry.text)}</p>
            <span class="wc-time">${time}</span>
          </div>`;
        }

        return `<div class="wc">
          <div class="wc-meta">
            <div class="wc-avatar">${initial}</div>
            <span class="wc-name">${name}</span>
          </div>
          <p class="wc-text"><span class="wc-quote-icon">&ldquo;</span>${esc(entry.text)}</p>
          <span class="wc-time">${time}</span>
        </div>`;
      }

      /* ─────────────────── Render wall ─────────────────── */
      let lastCount = -1;

      function render(forceReset) {
        const entries = load();
        if (!forceReset && entries.length === lastCount) return;
        lastCount = entries.length;

        if (!entries.length) {
          mosaic.innerHTML = '';
          empty.classList.add('visible');
          return;
        }

        empty.classList.remove('visible');
        // Reset scroll when re-rendering so new card at top is visible
        scrollY   = 0;
        direction = 1;
        mosaic.style.transform = 'translateY(0)';
        mosaic.innerHTML = entries.slice().reverse().map(buildCard).join('');
      }

      /* ─────────────────── Auto-scroll ─────────────────── */
      let scrollY    = 0;
      let direction  = 1;
      const SPEED    = 0.45;
      const PAUSE_MS = 3000;
      let paused     = false;
      let scrollPaused = false; // paused by drawer
      let pauseTimer = null;

      function scrollLoop() {
        if (!scrollPaused) {
          const wall    = document.getElementById('wall');
          const content = document.getElementById('mosaic');
          const maxScroll = Math.max(0, content.scrollHeight - wall.clientHeight + 40);

          if (!paused && maxScroll > 0) {
            scrollY += SPEED * direction;

            if (scrollY >= maxScroll) {
              scrollY   = maxScroll;
              direction = -1;
              paused    = true;
              clearTimeout(pauseTimer);
              pauseTimer = setTimeout(() => { paused = false; }, PAUSE_MS);
            } else if (scrollY <= 0) {
              scrollY   = 0;
              direction = 1;
              paused    = true;
              clearTimeout(pauseTimer);
              pauseTimer = setTimeout(() => { paused = false; }, PAUSE_MS);
            }

            content.style.transform = `translateY(-${scrollY}px)`;
          }
        }
        requestAnimationFrame(scrollLoop);
      }

      /* ─────────────────── Drawer ─────────────────── */
      const fab      = document.getElementById('wish-fab');
      const drawer   = document.getElementById('wish-drawer');
      const backdrop = document.getElementById('drawer-backdrop');
      const closeBtn = document.getElementById('drawer-close');
      const form     = document.getElementById('wall-wish-form');

      const typeBtns    = drawer.querySelectorAll('.d-type-btn');
      const wishGroup   = document.getElementById('w-wish-group');
      const doaGroup    = document.getElementById('w-doa-group');
      let   currentType = 'wish';

      function openDrawer() {
        drawer.classList.add('open');
        backdrop.classList.add('open');
        backdrop.removeAttribute('aria-hidden');
        fab.setAttribute('aria-expanded', 'true');
        scrollPaused = true;
        document.getElementById('w-name').focus();
      }

      function closeDrawer() {
        drawer.classList.remove('open');
        backdrop.classList.remove('open');
        backdrop.setAttribute('aria-hidden', 'true');
        fab.removeAttribute('aria-expanded');
        scrollPaused = false;
      }

      fab.addEventListener('click', openDrawer);
      closeBtn.addEventListener('click', closeDrawer);
      backdrop.addEventListener('click', closeDrawer);

      // Escape key
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape' && drawer.classList.contains('open')) closeDrawer();
      });

      // Type tab switching
      typeBtns.forEach(btn => {
        btn.addEventListener('click', () => {
          typeBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
          btn.classList.add('active');
          btn.setAttribute('aria-selected', 'true');
          currentType = btn.dataset.type;
          if (currentType === 'doa') {
            wishGroup.hidden = true;
            doaGroup.hidden  = false;
          } else {
            wishGroup.hidden = false;
            doaGroup.hidden  = true;
          }
        });
      });

      /* ─────────────────── Form submit ─────────────────── */
      function showErr(id, msg) {
        const el = document.getElementById(id);
        if (el) { el.textContent = msg; el.classList.add('visible'); }
      }
      function clearErr(id) {
        const el = document.getElementById(id);
        if (el) el.classList.remove('visible');
      }

      let toastTimer = null;
      function showToast(msg) {
        const toast = document.getElementById('wish-toast');
        toast.textContent = msg;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), 3200);
      }

      form.addEventListener('submit', e => {
        e.preventDefault();
        let valid = true;

        const nameRaw = document.getElementById('w-name').value;
        const name    = sanitize(nameRaw);
        clearErr('w-name-err');
        if (!name) { showErr('w-name-err', 'Please enter your name.'); valid = false; }

        let text = '';
        if (currentType === 'doa') {
          text = sanitize(document.getElementById('w-doa').value);
          clearErr('w-doa-err');
          if (!text) { showErr('w-doa-err', 'Please write your doa.'); valid = false; }
        } else {
          text = sanitize(document.getElementById('w-text').value);
          clearErr('w-text-err');
          if (!text) { showErr('w-text-err', 'Please write your wish.'); valid = false; }
        }

        if (!valid) return;

        const entry = { type: currentType, name, text, time: Date.now() };
        const entries = load();
        entries.push(entry);
        save(entries);

        // Reset form
        form.reset();
        typeBtns.forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected', 'false'); });
        typeBtns[0].classList.add('active'); typeBtns[0].setAttribute('aria-selected', 'true');
        currentType  = 'wish';
        wishGroup.hidden = false;
        doaGroup.hidden  = true;

        closeDrawer();
        render(true);
        showToast('✓  Your message is on the wall!');
      });

      /* ─────────────────── Demo seed (only when wall is empty or has old placeholder) ─────────────────── */
      function seedDemo() {
        const existing = load();
        // Skip if real data exists (no stale SVG placeholders)
        const hasOldSvg = existing.some(e => e.photoDataUrl && e.photoDataUrl.startsWith('data:image/svg'));
        if (existing.length > 0 && !hasOldSvg) return;

        // Free-to-use Unsplash wedding/celebration photos (no auth required)
        const PHOTOS = [
          'https://images.unsplash.com/photo-1519225421980-715cb0215aed?w=800&fm=webp&q=75',
          'https://images.unsplash.com/photo-1511285560929-80b456fea0bc?w=800&fm=webp&q=75',
          'https://images.unsplash.com/photo-1606800052052-a08af7148866?w=800&fm=webp&q=75',
        ];

        const now = Date.now();
        const demos = [
          { type: 'wish',  name: 'Ahmad Faris',    text: 'Barakallahu lakuma wa baraka \'alaykuma wa jama\'a baynakuma fi khayr. Tahniah Cin & Qiela! 🤍', time: now - 600000 },
          { type: 'doa',   name: 'Fatimah Zahra',  text: 'Semoga rumah tangga Muhsin & Syaqiela diberkati Allah, sakinah mawaddah warahmah. Semoga kekal hingga ke syurga. 💛', time: now - 480000 },
          { type: 'photo', name: 'Zainab',          photoDataUrl: PHOTOS[0], caption: 'Such a beautiful ceremony — so happy to witness this blessed day for Sen & Qie! 🌸', time: now - 360000 },
          { type: 'wish',  name: 'Dr. Hakim',       text: 'May Allah shower Muhsin & Syaqiela with endless blessings, love and happiness. Wishing you both a lifetime of joy together.', time: now - 300000 },
          { type: 'photo', name: 'Nurul Ain',        photoDataUrl: PHOTOS[1], caption: 'Selamat pengantin baru Cin & Qiela! 💛', time: now - 240000 },
          { type: 'doa',   name: 'Ustaz Ridhwan',   text: 'اللَّهُمَّ بَارِكْ لَهُمَا وَبَارِكْ عَلَيْهِمَا وَاجْمَعْ بَيْنَهُمَا فِي خَيْرٍ. Aamiin ya Rabbal \'Aalamin. Tahniah Muhsin & Syaqiela.', time: now - 180000 },
          { type: 'wish',  name: 'Hafizuddin',      text: 'Tahniah Sen & Sya! Semoga majlis ini penuh barakah dan menjadi kenangan indah buat selamanya. 🌙', time: now - 120000 },
          { type: 'photo', name: 'Rania & family',  photoDataUrl: PHOTOS[2], caption: 'Came all the way from Kedah for Cin & Qiela — so worth it! Love you both!', time: now - 60000 },
          { type: 'wish',  name: 'Encik Azlan',     text: 'Congratulations Muhsin & Syaqiela! May your home always be filled with laughter, patience and endless love for one another. 💐', time: now - 30000 },
          { type: 'wish',  name: 'Syafiqah',        text: 'Qiela, you look absolutely radiant today! Wishing you and Muhsin the most wonderful life ahead. 🌸', time: now - 10000 },
        ];

        try { localStorage.setItem(GB_KEY, JSON.stringify(demos)); } catch { /* quota */ }
      }

      /* ─────────────────── Init ─────────────────── */
      seedDemo();
      render();
      requestAnimationFrame(scrollLoop);
      setInterval(render, 10_000);
    })();
  </script>
</body>
</html>
