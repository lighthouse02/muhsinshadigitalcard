<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <rect width="64" height="64" rx="14" fill="#1a1208"/>
  <!-- outer faint ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="#C8A96E" stroke-width="0.8" opacity="0.3"/>
  <!-- 5 outer petals -->
  <g transform="translate(32,32)">
    <ellipse cx="0" cy="-13" rx="5.5" ry="10" fill="#C8A96E" opacity="0.88" transform="rotate(0)"/>
    <ellipse cx="0" cy="-13" rx="5.5" ry="10" fill="#C8A96E" opacity="0.88" transform="rotate(72)"/>
    <ellipse cx="0" cy="-13" rx="5.5" ry="10" fill="#C8A96E" opacity="0.88" transform="rotate(144)"/>
    <ellipse cx="0" cy="-13" rx="5.5" ry="10" fill="#C8A96E" opacity="0.88" transform="rotate(216)"/>
    <ellipse cx="0" cy="-13" rx="5.5" ry="10" fill="#C8A96E" opacity="0.88" transform="rotate(288)"/>
    <!-- 5 inner petals offset 36° -->
    <ellipse cx="0" cy="-8" rx="3.5" ry="6.5" fill="#e8d090" opacity="0.75" transform="rotate(36)"/>
    <ellipse cx="0" cy="-8" rx="3.5" ry="6.5" fill="#e8d090" opacity="0.75" transform="rotate(108)"/>
    <ellipse cx="0" cy="-8" rx="3.5" ry="6.5" fill="#e8d090" opacity="0.75" transform="rotate(180)"/>
    <ellipse cx="0" cy="-8" rx="3.5" ry="6.5" fill="#e8d090" opacity="0.75" transform="rotate(252)"/>
    <ellipse cx="0" cy="-8" rx="3.5" ry="6.5" fill="#e8d090" opacity="0.75" transform="rotate(324)"/>
    <!-- centre -->
    <circle r="5" fill="#f0d878"/>
    <circle r="2.5" fill="#1a1208" opacity="0.6"/>
  </g>
</svg>
